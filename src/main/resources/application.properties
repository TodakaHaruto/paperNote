spring.application.name=paperNote
spring.messages.encoding=UTF-8


#message
spring.messages.basename=i18n/messages,i18n/ValidationMessages


#データソース
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/app_db
spring.datasource.username=appuser
spring.datasource.password=appuser

# MyBatis
mybatis.mapper-locations=classpath*:/mapper/postgres/*.xml

#Log Level
logging.level.com.example=debug