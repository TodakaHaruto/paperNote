<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}">
<head>
	<title>マイページ</title>
	<link rel="stylesheet" th:href="@{/css/user/list.css}">
</head>
<body>
	<div layout:fragment="content">
		<div class="header border-bottom">
			<h1 class="h2" th:text="#{mypage.title}"></h1>
		</div>
		<div class="mx-5 px-4">
			<p class="h4 pt-3" th:text="#{mypage.info}"></p>
			<table class="table table-striped table-bordered">
				<tbody>
					<tr>
						<th class="w-25" th:text="#{userId}"></th>
						<td th:text="${loginUser.userId}"></td>
					</tr>
					<tr>
						<th class="w-25" th:text="#{password}"></th>
						<td>********</td>
					</tr>
					<tr>
						<th class="w-25" th:text="#{userName}"></th>
						<td th:text="${loginUser.userName}"></td>
					</tr>
					<tr>
						<th class="w-25" th:text="#{birthday}"></th>
						<td th:text="${loginUser.birthday}"></td>
					</tr>
					<tr>
						<th class="w-25" th:text="#{gender}"></th>
						<td th:text="${loginUser.gender == 1 ? '男性' : '女性'}"></td>
					</tr>
				</tbody>
			</table>
		
			<form id="update" method="post" th:action="@{/home/user-info/update}" class="form-signup text-center">
				<!--旧ユーザID-->
				<input type="hidden" name="oldUserId" th:value="${loginUser.userId}" />
				<!--新ユーザID-->
				<input type="hidden" name="newUserId" th:value="${loginUser.userId}" />
				<!--ユーザ名-->
				<input type="hidden" name="userName" th:value="${loginUser.userName}"/>
				<!--誕生日-->
				<input type="hidden" name="birthday" th:value="${loginUser.birthday}"  />
				<!--性別-->
				<input type="hidden" name="gender" th:value="${loginUser.gender}" >
				<!--変更画面に遷移-->
				<button name="display" type="submit"  class="btn btn-primary w-20 mt-3" th:text="#{update}"></button>
			</form>
		</div>
		
	</div>
</body>
</html>
