<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}">
<head>
	<title>マイページ</title>
	<link rel="stylesheet" th:href="@{/css/user/list.css}">
</head>
<body>
	<div layout:fragment="content">
		<div class="header border-bottom">
			<h1 class="h2">パスワードの変更</h1>
		</div>
		<div class="mx-5 px-4">
			<p>新しいパスワードを入力してください</p>
			<form method="post" th:action="@{/home/user-info/update-pass}" th:object="${passwordForm}">
				<table class="table table-striped table-bordered">
					<input type="hidden" th:field="*{userId}">
					<tbody>
						<tr>
							<th class="w-25">パスワード</th>
							<td>
								<input type="password" th:errorclass="is-invalid" th:field="*{password}">
								<div class="invalid-feedback" th:errors="*{password}"></div>
							</td>
						</tr>
					</tbody>
				</table>
				<!--登録ボタン-->
					<div class="text-center">
						<button name="update" type="submit" class="btn btn-primary w-20 mt-3">変更内容を登録</button>
					</div>
			</form>
		</div>
		
	</div>
</body>
</html>
