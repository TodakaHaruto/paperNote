<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}">
<head>
	<title>論文詳細</title>
</head>
<body>
	<div layout:fragment="content">
		<div class="header border-bottom">
			<p class="h2">論文詳細</p>
		</div>
		<!-- 一覧表示 -->
		<div class="mx-5">
			<div class="d-flex my-2">
				<form class="" id="update" method="post" th:action="@{/home/detail/{id}(id=${paperDetailForm.paperId})}">
					<button type="submit" class="btn btn-primary" name="update">更新</button>
				</form>
				<form class="mx-2" id="deleteForm" method="post" th:action="@{/home/detail/{id}(id=${paperDetailForm.paperId})}" onsubmit="return CheckDelete()">
					<button type="submit" class="btn btn-danger" name="delete">削除</button>
				</form>	
			</div>
					
			<table class="table table-striped table-bordered">
				<tbody>
					<tr>
						<th class="th-width">論文タイトル</th>
						<td th:text="${paperDetailForm.title}"></td>
					</tr>
					<tr>
						<th class="th-width">記録日</th>
						<td th:text="${#dates.format(paperDetailForm.readDate, 'yyyy-MM-dd')}"></td>
					</tr>
					<tr>
						<th class="th-width">論文URL</th>
						<td><a th:text="${paperDetailForm.paperUrl}" th:href="${paperDetailForm.paperUrl}" target="_blank"></a></td>
						
					</tr>
					<tr>
						<th class="th-width">得た知見</th>
						<td th:text="${paperDetailForm.learningNote}"></td>
					</tr>
				</tbody>
			</table>
			<div class="row">
				<div class="col mr-3">
					<div class="border-bottom mb-2">
						<p class="h4">先行研究</p>
					</div>
					<table class="table table-striped table-bordered table-hover">
						<tbody>
							<tr th:each="item : ${preCitations}"
							    th:onclick="|window.location.href='@{/home/detail/{id}(id=${item.citedPaperId})}'|">
							    <td th:text="${item.citedPaperTitle}"></td>
							</tr>
						</tbody>
					</table>
				</div>
				<div class="col ml-3">
					<div class="border-bottom mb-2">
						<p class="h4">後続研究</p>
					</div>
					<table class="table table-striped table-bordered table-hover">
						<tbody>
							<tr th:each="item : ${subCitations}"
							    th:onclick="|window.location.href='@{/home/detail/{id}(id=${item.citingPaperId})}'|">
							    <td th:text="${item.citingPaperTitle}"></td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
		<script>
			document.addEventListener('DOMContentLoaded', function() {
			    const form = document.getElementById('deleteForm');
			    form.addEventListener('submit', function(e) {
			        if (!confirm('削除しますか？')) {
			            e.preventDefault();
			        }
			    });
			});
			</script>
	</div>
	
	
</body>
</html>
