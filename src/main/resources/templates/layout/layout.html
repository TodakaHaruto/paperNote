<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<!-- CSS読み込み -->
<link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/layout/layout.css}">
<!-- JS読み込み -->
<script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}" defer></script>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.min.js}" defer></script>
<title></title>
</head>
<body>
<!-- ヘッダー -->
<nav th:replace="~{layout/header :: header}"></nav>

<!-- ヘッダー直下のメイン領域 -->
<div class="container-fluid">
	<div class="row">
		<!-- メニュー -->
		<nav class="col-sm-2 bg-light sidebar pt-3 min-vh-100">
			<div th:replace="~{layout/menu :: menu}"></div>
		</nav>
		
		<!-- コンテンツ -->
		<main class="col-sm-10 main pt-3">
			<div layout:fragment="content"></div>
		</main>
	</div>
</div>

</body>
</html>
